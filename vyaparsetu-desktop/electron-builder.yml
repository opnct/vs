appId: com.vyaparsetu.pos
productName: VyaparSetu POS
publish: null
directories:
  output: dist_electron
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target: nsis
  # icon: build/icon.ico # Uncomment and add an icon.ico to a build/ folder later
nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "VyaparSetu POS"
mac:
  target: dmg
linux:
  target: AppImage
# CRITICAL: Forces electron-builder to recompile better-sqlite3 native C code for Windows
buildDependenciesFromSource: false
npmRebuild: true