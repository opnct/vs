<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VyaparSetu.gov | Data for Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-6 border-b border-gray-800 bg-black sticky top-0 z-50">
        <div class="text-2xl font-bold tracking-tighter">VyaparSetu<span class="text-blue-500">.gov</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-semibold uppercase tracking-widest">
            <a href="#" class="hover:text-blue-400">About</a>
            <a href="#" class="hover:text-blue-400">Markets</a>
            <div class="group relative">
                <button class="hover:text-blue-400">Themes ▼</button>
                <div class="absolute right-0 mt-2 w-48 bg-zinc-900 border border-zinc-800 hidden group-hover:block">
                    <a href="#" class="block px-4 py-2 hover:bg-zinc-800">Logistics</a>
                    <a href="#" class="block px-4 py-2 hover:bg-zinc-800">Export/Import</a>
                    <a href="#" class="block px-4 py-2 hover:bg-zinc-800">Market Trends</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-bg h-[70vh] flex flex-col justify-center px-10">
        <h1 class="text-7xl font-bold mb-4 uppercase leading-none">Data For <br><span id="dynamic-text">Global Trade</span></h1>
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 w-max flex items-center gap-2">
            EXPLORE <span class="text-xl">↓</span>
        </button>
    </section>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <h2 class="text-3xl font-bold mb-8 text-center uppercase tracking-widest">VyaparSetu AI Portal</h2>
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-lg shadow-2xl">
            <div id="chat-window" class="h-80 overflow-y-auto mb-6 flex flex-col gap-4 p-4 border-b border-zinc-800">
                <p class="text-zinc-400 italic">Connected to VyaparSetu Intelligence Hub... How can I assist with your trade data today?</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="user-input" class="flex-1 bg-black border border-zinc-700 p-4 focus:border-blue-500 outline-none" placeholder="Ask about market trends, logistics, or HS codes...">
                <button onclick="sendMessage()" class="bg-white text-black font-bold px-8 hover:bg-zinc-200 transition">SEND</button>
            </div>
        </div>
    </main>

    <footer class="bg-zinc-900 py-10 px-10 border-t border-zinc-800 text-xs text-zinc-500">
        <div class="flex justify-between">
            <p>© 2026 VyaparSetu AI - An official portal for business connectivity.</p>
            <div class="flex gap-4">
                <a href="#">Privacy Policy</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </footer>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value) return;

            // Add User Message
            chatWindow.innerHTML += `<div class="self-end bg-blue-600 p-3 rounded-l-lg max-w-xs text-sm">${input.value}</div>`;
            const message = input.value;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Add AI Message
                chatWindow.innerHTML += `<div class="self-start bg-zinc-800 p-3 rounded-r-lg max-w-md text-sm border border-zinc-700">${data.response}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (err) {
                chatWindow.innerHTML += `<div class="text-red-500 text-xs">Connection Error.</div>`;
            }
        }
    </script>
</body>
</html>
